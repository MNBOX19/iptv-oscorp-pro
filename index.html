<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    
    <title>IPTV OSCORP PRO</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* TEMA DARK E GOLD */
            --bg-deep: #050505; 
            --bg-layer: #0a0a0a;
            --main-color: #D4AF37; /* Dourado Premium */
            --main-color-hover: #FADB5F;
            --font-xs: 1.8vh; --font-sm: 2.2vh; --font-md: 3vh; --font-lg: 5vh;
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; outline: none; 
            user-select: none;           
        }
        
        html, body {
            background: var(--bg-deep); color: #ffffff; font-family: 'Montserrat', sans-serif;
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; width: 100%; height: 100%; 
            overflow: hidden !important; overscroll-behavior: none;
            transform: translate3d(0,0,0);
        }

        .theme-text { color: var(--main-color); }

        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-deep); z-index: 9999999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        
        .splash-logo { font-size: 14vh; font-weight: 900; letter-spacing: 2px; text-align: center; }

        .hide { display: none !important; }
        .flex-center { display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; background: var(--bg-layer); overflow: hidden; }

        button, .smart-card, .cat-item, .item, .power-btn, .key, .toggle-btn, .menu-card, .menu-btn, .menu-power-btn, .grid-item, .ep-item { cursor: pointer; }
        
        .focused { 
            border: 3px solid #fff !important; background: var(--main-color) !important; color: #000 !important; 
            z-index: 50; transform: scale(1.02) translateZ(0) !important;
        }
        
        .focused i, .focused span, .focused div { color: #000 !important; }
        
        .grid-item.focused { transform: scale(1.05) translateZ(0) !important; background: #222 !important; border-color: var(--main-color) !important; }
        .grid-item.focused .title { color: #000 !important; }
        
        #vid-box.focused { border: 4px solid var(--main-color) !important; background: transparent !important; transform: none !important; }
        
        #vid-box.fs, #vid-box.fs.focused { 
            border: none !important; width: 100vw !important; height: 100vh !important; 
            z-index: 999999 !important; position: fixed !important; top: 0 !important; left: 0 !important; 
            background: #000 !important; transform: none !important; display: block !important; 
        }

        .login-box { width: 450px; max-width: 90%; padding: 40px; background: rgba(0,0,0,0.8); border: 2px solid var(--main-color); border-radius: 12px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .logo-txt { font-size: 4.5vh; font-weight: 900; margin-bottom: 2.5vh; text-align: center; }
        .inp { width: 100%; padding: 16px; margin: 10px 0; background: #111; border: 1px solid #333; color: #fff; text-align: center; font-weight: 600; border-radius: 8px; font-size: 16px; }
        .btn { width: 100%; padding: 16px; margin-top: 20px; background: var(--main-color); color: #000; border: none; font-weight: 900; border-radius: 8px; font-size: 16px; }
        .btn-logout { background: #222; color: #fff; margin-top: 10px; border: 1px solid #444; }

        .menu-top-bar { position: absolute; top: 6vh; left: 8vw; width: 84vw; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .menu-top-left { display: flex; align-items: center; } 
        .menu-date { font-size: 2.6vh; font-weight: normal; color: #aaa; margin-left: 20px; }
        
        .menu-power-btn { 
            width: auto; height: auto; padding: 1vh; border: none; background: transparent !important;
            display: flex; align-items: center; justify-content: center; 
        }
        .menu-power-btn i { font-size: 4.5vh; color: #ffffff; text-shadow: none; }
        .menu-power-btn.focused { border: none !important; background: transparent !important; transform: scale(1.2) !important; }
        .menu-power-btn.focused i { color: var(--main-color) !important; text-shadow: 0 0 15px rgba(212, 175, 55, 0.6); }

        .menu-center-wrapper { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .smarters-grid { display: flex; width: 84vw; height: 58vh; }
        .smarters-left { flex: 0 0 32%; display: flex; margin-right: 2vw; }
        .smarters-right { flex: 1; display: flex; flex-direction: column; }
        .smarters-right-top { flex: 1; display: flex; margin-bottom: 2vh; }
        .smarters-right-bottom { height: 9vh; display: flex; }
        
        .smarters-right-top > div:first-child { margin-right: 2vw; }
        .smarters-right-bottom > div:first-child { margin-right: 2vw; }

        /* TEMA PREMIUM ESCURO NOS CARDS */
        .menu-card { flex: 1; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px solid #222; background: #111; transition: transform 0.2s; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        .menu-card .card-icon { font-size: 9vh; margin-bottom: 1.5vh; color: var(--main-color); }
        .menu-card .card-title { font-size: 3.5vh; font-weight: 800; letter-spacing: 1px; color: #fff; text-transform: uppercase; }
        
        .menu-card.focused { border: 3px solid #fff !important; transform: scale(1.03) translateZ(0) !important; background: linear-gradient(135deg, #D4AF37 0%, #997A00 100%) !important; }
        .menu-card.focused .card-icon, .menu-card.focused .card-title { color: #000 !important; }
        
        .menu-btn { flex: 1; background: #1a1a1a; border: 2px solid #333; border-radius: 8px; font-weight: bold; font-size: 2.6vh; color: var(--main-color); display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .menu-btn i { margin-right: 1vw; font-size: 3vh; }
        .menu-btn.focused { background: var(--main-color) !important; border-color: #fff !important; color: #000 !important; transform: scale(1.03) translateZ(0) !important; }
        .menu-btn.focused i { color: #000 !important; }

        .menu-footer { position: absolute; bottom: 6vh; left: 8vw; width: 84vw; display: flex; justify-content: space-between; font-size: 2.6vh; color: #aaa; font-weight: normal; z-index: 10; }
        
        .config-row { display: flex; margin: 2vh 0; }
        .toggle-btn { flex: 1; margin: 0 0.5vw; padding: 1.5vh; background: #111; border: 1px solid #333; color: #888; font-size: var(--font-sm); font-weight: 800; border-radius: 1vh; }
        .info-row { display: flex; justify-content: space-between; padding: 1vh 0; border-bottom: 1px solid #222; font-size: var(--font-sm); color: #ccc; }
        
        #content-layer { display: flex; width: 100%; height: 100%; background: var(--bg-deep); overflow: hidden; }
        .col-cat { width: 25%; background: rgba(0,0,0,0.6); display: flex; flex-direction: column; border-right: 2px solid rgba(212,175,55,0.1); height: 100%; overflow: hidden; }
        .col-list { width: 35%; background: rgba(0,0,0,0.4); display: flex; flex-direction: column; border-right: 2px solid rgba(212,175,55,0.1); height: 100%; overflow: hidden; }
        .col-play { flex: 1; display: flex; flex-direction: column; position: relative; background: transparent; height: 100%; overflow: hidden; }

        .mode-grid .col-cat { width: 20%; }
        .mode-grid .col-list { width: 80%; border-right: none; }
        .mode-grid .col-play { display: none; } 

        .cat-head { padding: 15px; background: rgba(0,0,0,0.8); color: var(--main-color); border-bottom: 2px solid #222; text-align: center; font-size: var(--font-md); font-weight: 900; flex-shrink: 0; }
        .cat-top-row { display: flex; align-items: center; width: 100%; }
        .cat-title-txt { flex: 1; text-align: center; }
        .cat-list, .item-list, .grid-view { flex: 1; height: 100%; overflow-y: auto; transform: translateZ(0); }
        
        .cat-item, .item { padding: 14px 20px; border-radius: 6px; margin: 6px 12px; color: #aaa; font-size: var(--font-sm); font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border: 1px solid transparent; }
        .cat-item.active { background: #111; color: var(--main-color); border-left: 4px solid var(--main-color); }
        .item { border-bottom: 1px solid #222; }
        .item.playing { color: #000; background: var(--main-color); border-left: 4px solid #fff; }
        .fav-icon { float: right; color: var(--main-color); }

        .search-area { padding: 15px; background: rgba(0,0,0,0.8); border-bottom: 2px solid #222; flex-shrink: 0; }
        .inp-search { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; font-size: var(--font-sm); font-weight: bold; border-radius: 6px; text-transform: uppercase; text-align: center; }
        
        .grid-view { display: block; padding: 20px; text-align: left; }
        .grid-item { display: inline-block; vertical-align: top; width: 18%; margin: 0 1% 15px 1%; text-align: center; border: 3px solid transparent; border-radius: 6px; padding: 5px; background: #111; }
        .grid-item img { width: 100%; height: auto; object-fit: contain; border-radius: 4px; background: #000; }
        .grid-item .title { width: 100%; font-size: 1.6vh; color: #fff; margin-top: 8px; text-align: center; white-space: normal; overflow: visible; line-height: 1.2; font-weight: 800; }

        .vid-box { width: 100%; height: 50vh; background: #000; position: relative; border-bottom: 2px solid var(--main-color); overflow: hidden; flex-shrink: 0; transform: translateZ(0); }
        #player-container { width:100%; height:100%; background:#000; transform: translateZ(0); }
        video { width: 100%; height: 100%; object-fit: fill; background: #000; z-index: 1; transform: translateZ(0); }
        .buffer-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 50; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .buffer-spinner { font-size: 8vh; color: var(--main-color); }
        #pause-layer { display: none; position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7); z-index: 9000; align-items: center; justify-content: center; pointer-events: none; }
        
        .meta { padding: 25px; flex: 1; height: 100%; overflow-y: auto; background: rgba(0,0,0,0.4); display: flex; flex-direction: column; }
        .meta-title { font-size: var(--font-lg); color: var(--main-color); font-weight: 900; margin-bottom: 1vh; }
        .meta-desc { font-size: var(--font-sm); color: #999; margin-bottom: 1vh; }
        
        .keys { display: flex; justify-content: space-between; align-items: center; padding-top: 2vh; border-top: 2px solid #222; margin-top: auto; flex-shrink: 0; }
        .key { flex: 1; margin: 0 0.5vw; font-size: var(--font-xs); color: #aaa; font-weight: 700; background: #111; border: 1px solid #333; padding: 1.2vh 0.5vw; border-radius: 0.8vh; display: flex; align-items: center; justify-content: center; white-space: nowrap; }
        .key:first-child { margin-left: 0; }
        .key:last-child { margin-right: 0; }
        .dot { width: 1.2vh; height: 1.2vh; border-radius: 50%; flex-shrink: 0; margin-right: 1.2vw; }

        #episodes-layer { background: rgba(0,0,0,0.9); z-index: 99999; }
        .ep-modal { width: 70%; height: 90%; background: var(--bg-deep); border: 2px solid var(--main-color); border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.9); }
        .ep-header { padding: 20px; text-align: center; font-size: 3.5vh; font-weight: 900; background: #111; color: var(--main-color); border-bottom: 2px solid #333; }
        .ep-list { flex: 1; overflow-y: auto; padding: 20px; }
        .ep-item { padding: 15px 20px; border-bottom: 1px solid #222; font-size: 2.2vh; font-weight: 700; color: #ccc; border-radius: 6px; }
        .ep-item.focused { background: var(--main-color) !important; color: #000 !important; border: 3px solid #fff !important; transform: scale(1.02); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--main-color); border-radius: 10px; }
    </style>
</head>
<body onload="App.init()">

    <div id="splash-screen">
        <div class="splash-logo"><span style="color:#fff">IPTV</span> <span class="theme-text">OSCORP PRO</span></div>
    </div>

    <div id="login-layer" class="layer flex-center hide">
        <div class="login-box">
            <div class="logo-txt"><span style="color:#fff">IPTV</span> <span class="theme-text">OSCORP PRO</span></div>
            <input type="text" id="i0" class="inp focusable" placeholder="DNS (Ex: meudns.com)" autocomplete="off">
            <input type="text" id="i1" class="inp focusable" placeholder="USUÁRIO" autocomplete="off">
            <input type="password" id="i2" class="inp focusable" placeholder="SENHA" autocomplete="off">
            <button id="i3" class="btn focusable" onclick="App.login(false)">ENTRAR AGORA</button>
            <div id="msg-login" style="color:var(--main-color); margin-top:20px; font-size:var(--font-sm); font-weight: 800;"></div>
        </div>
    </div>

    <div id="menu-layer" class="layer hide">
        <div class="menu-top-bar">
            <div class="menu-top-left">
                <div class="logo-txt" style="margin:0; font-size: 3.5vh;"><span style="color:#fff">IPTV</span> <span class="theme-text">OSCORP PRO</span></div>
                <div id="menu-date" class="menu-date">--:--</div>
            </div>
            <div id="m3" class="menu-power-btn focusable" onclick="App.logout()">
                <i class="fas fa-power-off"></i>
            </div>
        </div>

        <div class="menu-center-wrapper">
            <div class="smarters-grid">
                <div class="smarters-left">
                    <div id="m0" class="menu-card focusable" onclick="App.openMode('live')">
                        <i class="fas fa-tv card-icon"></i>
                        <div class="card-title">TV AO VIVO</div>
                    </div>
                </div>
                <div class="smarters-right">
                    <div class="smarters-right-top">
                        <div id="m1" class="menu-card focusable" onclick="App.openMode('vod')">
                            <i class="fas fa-play-circle card-icon"></i>
                            <div class="card-title">FILMES</div>
                        </div>
                        <div id="m2" class="menu-card focusable" onclick="App.openMode('series')">
                            <i class="fas fa-clapperboard card-icon"></i>
                            <div class="card-title">SÉRIES</div>
                        </div>
                    </div>
                    <div class="smarters-right-bottom">
                        <div id="m4" class="menu-btn focusable" onclick="App.openSettings()" style="flex: 1;">
                            <i class="fas fa-user"></i> MINHA CONTA
                        </div>
                        <div style="flex: 1;"></div> 
                    </div>
                </div>
            </div>
        </div>

        <div class="menu-footer">
            <div id="menu-exp">Expiração: ...</div>
            <div id="menu-user">Usuário: ...</div>
        </div>
    </div>

    <div id="content-layer" class="layer hide">
        <div class="col-cat">
            <div class="cat-head">
                <div class="cat-top-row">
                    <div id="cat-title-txt" class="cat-title-txt">MENU</div>
                </div>
                <div id="item-count" style="font-size: 0.7em; margin-top: 5px; opacity: 0.7;">TOTAL: ...</div>
            </div>
            <div id="cat-list" class="cat-list"></div>
        </div>
        
        <div class="col-list">
            <div class="search-area"><input type="text" id="search" class="inp-search focusable" placeholder="BUSCAR..." autocomplete="off"></div>
            <div id="item-list" class="item-list"></div>
            <div id="grid-list" class="grid-view hide"></div>
        </div>
        
        <div class="col-play">
            <div id="vid-box" class="vid-box focusable" onclick="App.toggleFull()">
                <div id="player-container">
                    <video id="player"></video>
                </div>
                <div id="smart-buffer" class="buffer-overlay"><i class="fas fa-circle-notch fa-spin buffer-spinner"></i></div>
                <div id="pause-layer"><i class="fas fa-pause" style="font-size: 10vh; color: rgba(212, 175, 55, 0.9);"></i></div>
            </div>
            <div class="meta">
                <div id="meta-title" class="meta-title"><span style="color:#fff">IPTV</span> <span class="theme-text">OSCORP PRO</span></div>
                <div id="meta-desc" class="meta-desc"></div>
                <div class="keys">
                    <div class="key" id="key-fs"><div class="dot" style="background-color:#FF0000; box-shadow: 0 0 10px #FF0000;"></div> TELA CHEIA</div>
                    <div class="key" id="key-top"><div class="dot" style="background-color:#00C851; box-shadow: 0 0 10px #00C851;"></div> TOPO</div>
                    <div class="key" id="key-search"><div class="dot" style="background-color:#ffbb33; box-shadow: 0 0 10px #ffbb33;"></div> BUSCAR</div>
                    <div class="key" id="key-menu"><div class="dot" style="background-color:#33b5e5; box-shadow: 0 0 10px #33b5e5;"></div> CONFIG.</div>
                </div>
            </div>
        </div>

    <div id="episodes-layer" class="layer flex-center hide">
        <div class="ep-modal">
            <div id="ep-title" class="ep-header">EPISÓDIOS</div>
            <div id="ep-list" class="ep-list"></div>
        </div>
    </div>

    <div id="settings-layer" class="layer hide flex-center">
        <div class="login-box">
            <div class="logo-txt" id="set-title-txt"><i class="fas fa-user-shield" style="margin-right:10px; color: var(--main-color);"></i>MINHA <span class="theme-text">CONTA</span></div>
            <div class="info-row"><span id="lbl-set-u">USUÁRIO:</span> <span id="set-user">...</span></div>
            <div class="info-row"><span id="lbl-set-e">VENCIMENTO:</span> <span id="set-exp">...</span></div>
            <div class="info-row"><span id="lbl-set-c">TELAS:</span> <span id="set-conn">...</span></div>
            <div class="config-row" style="margin-top: 30px;"><div id="s0" class="toggle-btn focusable" style="border-color: #333; background: #111; cursor: default;">OPÇÕES</div></div>
            <div class="config-row">
                <div id="s1" class="toggle-btn focusable" onclick="App.toggleCfg('filter')"><span id="lbl-set-filter">XXX:</span> <span id="lbl-filter" style="color:#fff">NÃO</span></div>
                <div id="s2" class="toggle-btn focusable" onclick="App.toggleFormat()"><span id="lbl-set-format">FMT:</span> <span id="lbl-format" style="color:#fff">TS NAT</span></div>
            </div>
            <button id="s3" class="btn focusable" onclick="App.closeSettings()" style="background: #222; color: #fff; margin-top: 20px;">VOLTAR</button>
            <button id="s4" class="btn btn-logout focusable" onclick="App.logout()">SAIR / DESLOGAR</button>
        </div>
    </div>

    <script>
        function safePlay(vidElement) {
            if (!vidElement) return;
            try { 
                var p = vidElement.play(); 
                if (p !== undefined && typeof p.catch === 'function') { p.catch(function(e) {}); } 
            } catch (e) {}
        }

        function requestNativeFullscreen(elem) {
            var target = elem || document.documentElement;
            try { 
                if (target.requestFullscreen) { 
                    var p = target.requestFullscreen(); 
                    if(p !== undefined && typeof p.catch === 'function') { p.catch(function(){}); } 
                } else if (target.webkitRequestFullscreen) { target.webkitRequestFullscreen(); } 
            } catch (e) {}
        }

        var FavManager = {
            key: 'rc_favs_smart', list: [],
            init: function() { var s = localStorage.getItem(this.key); this.list = s ? JSON.parse(s) : []; },
            toggle: function(id) { var idx = this.list.indexOf(id); if(idx > -1) this.list.splice(idx, 1); else this.list.push(id); localStorage.setItem(this.key, JSON.stringify(this.list)); if (App && App.renderList) App.renderList(); },
            isFav: function(id) { return this.list.indexOf(id) > -1; }
        };

        var PlayerEngine = {
            video: null, url: null, monitorTimer: null, lastTime: 0, stallCount: 0, retryCount: 0, isBuffering: false, maxRetries: 999999,

            init: function() { this.bindVideo(); },

            bindVideo: function() {
                this.video = document.getElementById('player'); 
                if(!this.video) return;
                
                this.video.onerror = function() { PlayerEngine.handleError(false); };
                this.video.onabort = function() { PlayerEngine.handleError(false); };
                this.video.onstalled = function() { PlayerEngine.showBuffer(); };
                
                this.video.onended = function() { 
                    if(App.currentMode === 'series') { App.playNextEpisode(); } 
                    else if(App.currentMode === 'vod') { App.exitFull(); } 
                    else { PlayerEngine.handleError(false); }
                };

                this.video.addEventListener('playing', function() { PlayerEngine.onPlaySuccess(); });
                this.video.addEventListener('waiting', function() { PlayerEngine.showBuffer(); });
                this.video.controls = false;
            },

            resetDOM: function() {
                if(this.video) {
                    try { this.video.pause(); } catch(e){}
                    this.video.removeAttribute('src'); 
                    this.video.load(); 
                }
            },

            play: function(url) {
                if (!url) return;
                if(this.url === url && !this.video.error) {
                    if(this.video.paused) safePlay(this.video);
                    return;
                }
                if (this.url && this.url !== url) { this.hardStop(); this.resetDOM(); }
                this.url = url; this.stallCount = 0; this.retryCount = 0;
                this.showBuffer();
                document.getElementById('pause-layer').style.display = 'none';
                
                if(this.video) { this.video.src = url; safePlay(this.video); }
                this.startMonitor();
            },
            
            onPlaySuccess: function() { this.stallCount = 0; this.retryCount = 0; this.hideBuffer(); },
            showBuffer: function() { this.isBuffering = true; var el = document.getElementById('smart-buffer'); if(el) el.style.display = 'flex'; },
            hideBuffer: function() { this.isBuffering = false; var el = document.getElementById('smart-buffer'); if(el) el.style.display = 'none'; },
            
            startMonitor: function() {
                this.stopMonitor();
                this.monitorTimer = setInterval(function() {
                    var v = PlayerEngine.video; 
                    if(!v || !PlayerEngine.url || v.paused) return;
                    if(Math.abs(v.currentTime - PlayerEngine.lastTime) < 0.1) {
                        PlayerEngine.stallCount++;
                        if(PlayerEngine.stallCount > 3) PlayerEngine.showBuffer();
                        if(PlayerEngine.stallCount > 6) { PlayerEngine.stallCount = 0; PlayerEngine.handleError(true); }
                    } else { 
                        PlayerEngine.stallCount = 0; PlayerEngine.lastTime = v.currentTime; 
                        if(PlayerEngine.isBuffering) PlayerEngine.hideBuffer();
                    }
                }, 2000);
            },
            stopMonitor: function() { if(this.monitorTimer) clearInterval(this.monitorTimer); },

                if(rawT.length === 0) { if(this.lastCatIdx > -1) { this.loadContent(this.lastCatIdx); } else { document.getElementById('item-list').innerHTML = '<div style="padding:20px; text-align:center;">&larr; SELECIONE UMA CATEGORIA</div>'; this.fullData = []; this.renderList(); } return; }
                if(rawT.length < 2) return; var tStr = App.removeAccents(rawT);
                var actionStr = 'get_live_streams'; if(this.currentMode === 'vod') actionStr = 'get_vod_streams'; if(this.currentMode === 'series') actionStr = 'get_series';
                
                if (isGlobal) {
                    var loader = '<div style="padding:20px; text-align:center; color: var(--main-color); font-size: 2vh;"><i class="fas fa-circle-notch fa-spin" style="font-size: 5vh; margin-bottom: 15px;"></i><br><br>BUSCANDO...</div>';
                    document.getElementById('item-list').innerHTML = loader; document.getElementById('grid-list').innerHTML = loader;
                    App.req(App.creds.h+"/player_api.php?username="+App.creds.u+"&password="+App.creds.p+"&action="+actionStr, function(d) { 
                        if(d && d !== 'ERR_NET') { 
                            var res = []; var maxResults = 200; var junk = ['adulto','xxx','sex','porn','+18'];
                            for(var i=0; i<d.length; i++) { var nome = d[i].name || d[i].title || ""; var show = true; if(App.cfg.filter) { var lowerNome = nome.toLowerCase(); for(var j=0; j<junk.length; j++) { if(lowerNome.indexOf(junk[j]) > -1) { show = false; break; } } } if(show && App.removeAccents(nome).indexOf(tStr) > -1) { res.push(d[i]); if(res.length >= maxResults) break; } }
                            d = null; if (res.length > 0) { res.sort(App.smartSort); App.fullData = res; App.zone = 2; App.idx = 0; App.renderList(); } else { var emp = '<div style="padding:20px; text-align:center;">Nenhum resultado encontrado.</div>'; document.getElementById('item-list').innerHTML = emp; document.getElementById('grid-list').innerHTML = emp; }
                        } else { document.getElementById('item-list').innerHTML = '<div style="padding:20px; text-align:center;">Erro na conexão.</div>'; }
                    });
                } else {
                    setTimeout(function() {
                        var baseData = App.categoryDataCache || App.fullData; if (!baseData || baseData.length === 0) return;
                        var res = []; for(var i=0; i<baseData.length; i++) { var nome = baseData[i].name || baseData[i].title || ""; if(App.removeAccents(nome).indexOf(tStr) > -1) { res.push(baseData[i]); } }
                        if (res.length > 0) { App.fullData = res; App.renderList(); } else { document.getElementById('item-list').innerHTML = '<div style="padding:20px; text-align:center;">Não encontrado.<br><br>APERTE ENTER PARA BUSCA GLOBAL</div>'; }
                    }, 50);
                }
            },
            
            toggleFull: function() { if(!this.playingId) return; var b = document.getElementById('vid-box'); if(b.classList.contains('fs')) { this.exitFull(); } else { b.classList.add('fs'); requestNativeFullscreen(b); } },
            
            exitFull: function() { 
                var b = document.getElementById('vid-box'); b.classList.remove('fs'); 
                if(this.currentMode !== 'live') { document.getElementById('content-layer').classList.add('mode-grid'); PlayerEngine.hardStop(); } 
                document.getElementById('pause-layer').style.display = 'none'; 
                try { if (document.exitFullscreen) { document.exitFullscreen(); } else if (document.webkitExitFullscreen) { document.webkitExitFullscreen(); } } catch(e) {} 
                if (this.scr === 4) { this.zone = 4; this.updateFocus(); } else if (this.currentMode === 'vod') { this.zone = 2; this.updateFocus(); } else { this.syncFocusToPlaying(); }
            },
            
            back: function(isTrusted) {
                if (!isTrusted && new Date().getTime() - (this.lastScreenSwitch || 0) < 500) return;
                if(document.getElementById('vid-box').classList.contains('fs')) { this.exitFull(); return; }
                if(this.scr===4) { this.setScr(2); this.zone = 2; this.idx = this.lastGridIdx || 0; this.updateFocus(); return; } 
                if(this.scr===3) { this.closeSettings(); return; }
                if(this.scr===2) {
                    if(this.zone===3) { this.zone=2; this.syncFocusToPlaying(); this.updateFocus(); return; }
                    if(this.zone===2) { this.zone=0; this.idx=(this.lastCatIdx > -1 ? this.lastCatIdx : 0); this.updateFocus(); return; }
                    if(this.zone===1) { this.zone=2; this.idx=0; this.updateFocus(); return; }
                    if(this.zone===0) { this.setScr(1); return; } 
                }
            },
            
            updateFocus: function() {
                var focusedItems = document.querySelectorAll('.focused'); for(var k=0; k<focusedItems.length; k++) { focusedItems[k].classList.remove('focused'); }
                var el; 
                if(this.scr===0) el=document.getElementById('i'+this.idx); 
                if(this.scr===1) el=document.getElementById('m'+this.idx); 
                if(this.scr===3) el=document.getElementById('s'+this.idx);
                if(this.scr===4) { if(this.zone===4) el=document.getElementById('ep-'+this.idx); if(this.zone===3) el=document.getElementById('vid-box'); }
                if(this.scr===2) { if(this.zone===0) el=document.getElementById('c'+this.idx); if(this.zone===1) el=document.getElementById('search'); if(this.zone===2) el=document.getElementById('row-'+this.idx); if(this.zone===3) el=document.getElementById('vid-box'); }
                
                if(el) { 
                    el.classList.add('focused'); 
                    if(el.tagName==='INPUT') { try { el.focus({preventScroll:true}); } catch(e) { el.focus(); } } 
                    else { var inps = document.querySelectorAll('input'); for(var i=0; i<inps.length; i++) { inps[i].blur(); } if (document.activeElement && document.activeElement !== document.body) { try { document.activeElement.blur(); } catch(e) {} } } 
                    if(el.tagName!=='INPUT') { var p = el.parentElement; while(p && p !== document.body) { if(p.id === 'cat-list' || p.id === 'item-list' || p.id === 'grid-list' || p.id === 'ep-list') { p.scrollTop = el.offsetTop - (p.clientHeight / 2) + (el.clientHeight / 2); break; } p = p.parentElement; } }
                }
            },
            
            move: function(d) {
                var s = this.scr;
                if(s===0) { if(d===1 && this.idx < 3) this.idx++; if(d===0 && this.idx > 0) this.idx--; }
                else if(s===1) {
                    if(this.idx===0) { if(d===3) this.idx=1; else if(d===0) this.idx=3; } else if(this.idx===1) { if(d===2) this.idx=0; else if(d===3) this.idx=2; else if(d===1) this.idx=4; else if(d===0) this.idx=3; } else if(this.idx===2) { if(d===2) this.idx=1; else if(d===1) this.idx=4; else if(d===0) this.idx=3; } else if(this.idx===3) { if(d===1) this.idx=2; else if(d===2) this.idx=0; } else if(this.idx===4) { if(d===2) this.idx=0; else if(d===0) this.idx=1; }
                }
                else if(s===3) {
                    if(this.idx === 0) { if(d===1) this.idx = 1; } else if(this.idx === 1) { if(d===3) this.idx = 2; else if(d===1) this.idx = 3; else if(d===0) this.idx = 0; } else if(this.idx === 2) { if(d===2) this.idx = 1; else if(d===1) this.idx = 3; else if(d===0) this.idx = 0; } else if(this.idx === 3) { if(d===0) this.idx = 1; else if(d===3) this.idx = 4; } else if(this.idx === 4) { if(d===2) this.idx = 3; else if(d===0) this.idx = 1; }
                }
                else if(s===4) { if(this.zone===3) return; if(this.zone===4) { if(d===1 && this.idx < this.episodesData.length - 1) this.idx++; else if(d===0 && this.idx > 0) this.idx--; } }
                else if(s===2) {
                    if(this.zone===3) return; 
                    if(this.zone===0) { var max = document.getElementById('cat-list').children.length-1; if(d===1 && this.idx<max) this.idx++; if(d===0 && this.idx>0) this.idx--; if(d===3 && App.fullData.length>0) { this.zone=2; this.idx=0; App.renderList(); } }
                    else if(this.zone===2) { 
                        var dataLen = App.fullData.length;
                        if(this.currentMode === 'live') { 
                            if(d===1) { if(typeof this.idx === 'number' && this.idx < dataLen - 1) this.idx++; } else if(d===0) { if(typeof this.idx === 'number' && this.idx > 0) this.idx--; else if(this.idx === 0) this.zone = 1; } else if(d===2) { this.zone=0; this.idx=(this.lastCatIdx > -1 ? this.lastCatIdx : 0); } else if(d===3) { this.zone=3; }
                        } else { 
                            var cols = 5; if(d===1) { if(this.idx + cols < dataLen) this.idx += cols; else this.idx = dataLen - 1; } else if(d===0) { if(this.idx - cols >= 0) this.idx -= cols; else this.zone = 1; } else if(d===2) { if(this.idx % cols === 0) { this.zone=0; this.idx=(this.lastCatIdx > -1 ? this.lastCatIdx : 0); } else if(this.idx > 0) this.idx--; } else if(d===3) { if((this.idx + 1) % cols !== 0 && this.idx < dataLen - 1) this.idx++; }
                        }
                    } else if(this.zone===1) { if(d===1) { this.zone=2; this.idx=0; } if(d===2) { this.zone=0; this.idx=(this.lastCatIdx > -1 ? this.lastCatIdx : 0); } }
                }
                this.updateFocus();
            },

            enter: function() {
                var now = new Date().getTime(); if(now - this.lastEnter < 400) return; this.lastEnter = now; var currentScr = this.scr; 
                if(currentScr===0) { if(this.idx === 3) this.login(false); else if(this.idx < 3) this.move(1); }
                else if(currentScr===1) { if(this.idx === 0) this.openMode('live'); else if(this.idx === 1) this.openMode('vod'); else if(this.idx === 2) this.openMode('series'); else if(this.idx === 3) this.logout(); else if(this.idx === 4) this.openSettings(); }
                else if(currentScr===3) { if(this.idx === 1) this.toggleCfg('filter'); else if(this.idx === 2) this.toggleFormat(); else if(this.idx === 3) this.closeSettings(); else if(this.idx === 4) this.logout(); }
                else if(currentScr===4) { if(this.zone===4) this.playEpisode(this.idx); else if (this.zone===3) this.toggleFull(); } 
                else if(currentScr===2) { if(this.zone===0) this.catClick(this.idx, true); else if(this.zone===1) this.doSearch(true); else if(this.zone===2) this.itemClick(this.idx, true); else if(this.zone===3) this.toggleFull(); }
            }
        };

        document.addEventListener('keydown', function(e) {
            var k = e.keyCode;
            var isLeft = (k===37), isUp = (k===38), isRight = (k===39), isDown = (k===40), isEnter = (k===13 || k===295), isBack = (k===8 || k===27 || k===461 || k===10009 || k===88); 
            var isRed = (k===403 || k===82), isGreen = (k===404 || k===71), isYellow = (k===405 || k===89), isBlue = (k===406 || k===66 || k===275); 
            var isChUp = (k===427 || k===33), isChDown = (k===428 || k===34); 

            if(App.isMoving && (isLeft || isUp || isRight || isDown)) { e.preventDefault(); return; }
            if(isLeft || isUp || isRight || isDown) { App.isMoving = true; setTimeout(function() { App.isMoving = false; }, 60); }

            if(document.activeElement && document.activeElement.tagName === 'INPUT' && App.scr === 0) { if(isEnter || isDown) { e.preventDefault(); App.move(1); return; } if(isUp) { e.preventDefault(); App.move(0); return; } return; }
            
            if(App.scr === 2 && document.activeElement && document.activeElement.tagName === 'INPUT') { 
                if(isEnter) { App.doSearch(true); return; } 
                if(isDown) { e.preventDefault(); document.activeElement.blur(); App.zone=2; App.idx=0; App.updateFocus(); return; } 
                if(k === 27 || k === 461 || k === 10009) { e.preventDefault(); document.activeElement.blur(); App.zone=0; App.idx=(App.lastCatIdx > -1 ? App.lastCatIdx : 0); App.updateFocus(); return; }
                if(isLeft) { if(document.activeElement.selectionStart === 0 || document.activeElement.value === '') { e.preventDefault(); document.activeElement.blur(); App.zone=0; App.idx=(App.lastCatIdx > -1 ? App.lastCatIdx : 0); App.updateFocus(); return; } return; }
                if(isRight || isUp) { return; } return;
            }
            
            if(App.scr === 2 && App.currentMode === 'live') { if(isChUp) { e.preventDefault(); App.switchChannel(1); return; } if(isChDown) { e.preventDefault(); App.switchChannel(-1); return; } }
            if(k===48 || k===96) { if((App.scr===2 && App.zone===2) || (App.scr===4 && App.zone===4)) { var it=App.fullData[App.idx]; if(it) { FavManager.toggle(it.stream_id || it.series_id); } } }
            
            var isFull = document.getElementById('vid-box') && document.getElementById('vid-box').classList.contains('fs');
            
            if(isFull) { 
                e.preventDefault(); 
                if(isRed || isBack) { App.exitFull(); return; } 
                if(App.currentMode !== 'live') {
                    var vid = PlayerEngine.video;
                    if(vid) {
                        if(isEnter) { if(vid.paused) { safePlay(vid); document.getElementById('pause-layer').style.display = 'none'; } else { vid.pause(); document.getElementById('pause-layer').style.display = 'flex'; } return; }
                        if(isLeft) { vid.currentTime = Math.max(0, vid.currentTime - 30); return; }
                        if(isRight) { vid.currentTime = Math.min(vid.duration || (vid.currentTime + 30), vid.currentTime + 30); return; }
                    }
                } else { if(isEnter) { App.exitFull(); return; } }
                return; 
            }
            
            if(isLeft) { e.preventDefault(); App.move(2); } if(isUp) { e.preventDefault(); App.move(0); } if(isRight) { e.preventDefault(); App.move(3); } if(isDown) { e.preventDefault(); App.move(1); }
            if(isEnter) { e.preventDefault(); App.enter(); } 
            if(isBack) { e.preventDefault(); if(App.scr>0) { App.back(true); return; } }
            if(isRed) if(App.scr===2 || App.scr===4) App.toggleFull(); 
            if(isGreen) if(App.scr===2) { App.zone=0; App.idx=0; App.updateFocus(); } 
            if(isYellow) if(App.scr===2) { App.zone=1; App.updateFocus(); } 
            if(isBlue) { e.preventDefault(); if(App.scr===2) App.openSettings(); } 
        });

        window.addEventListener('beforeunload', function() { PlayerEngine.hardStop(); });
        window.addEventListener('unload', function() { PlayerEngine.hardStop(); });
        window.addEventListener('pagehide', function() { PlayerEngine.hardStop(); });
    </script>
